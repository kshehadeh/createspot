name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Generate release notes
        id: notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          PREV="$(git tag -l 'v*' --merged HEAD --sort=-v:refname | grep -Fxv "$TAG" | head -1 || true)"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"
          {
            echo "## Changes"
            echo ""
            if [ -n "$PREV" ]; then
              git log "${PREV}..${TAG}" --pretty=format:'- %s (%h)' --no-merges
            else
              git log --pretty=format:'- %s (%h)' --no-merges
            fi
          } > "$NOTES_FILE"
          if [ "$(wc -c < "$NOTES_FILE")" -lt 30 ]; then
            {
              echo "## Changes"
              echo ""
              echo "- (no commit messages)"
            } > "$NOTES_FILE"
          fi
          echo "path=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v42
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: "--prod"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          NOTES_FILE="${{ steps.notes.outputs.path }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            gh release edit "$TAG" \
              --repo "${{ github.repository }}" \
              --notes-file "$NOTES_FILE" \
              --latest \
              --verify-tag
          else
            gh release create "$TAG" \
              --repo "${{ github.repository }}" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE" \
              --latest \
              --verify-tag
          fi

      - name: Post changelog to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          export DISCORD_RELEASE_BODY="$(cat '${{ steps.notes.outputs.path }}')"
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "DISCORD_WEBHOOK_URL not set; skipping Discord."
            exit 0
          fi
          bun run --cwd apps/web changelog:discord
